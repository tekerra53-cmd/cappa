<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="50" cy="50" r="45" fill="url(#grad1)" stroke="#e2e8f0" stroke-width="2"/>

  <!-- Graduation cap -->
  <path d="M25 35 L50 25 L75 35 L75 45 L25 45 Z" fill="#ffffff" stroke="#ffffff" stroke-width="1"/>
  <rect x="35" y="45" width="30" height="3" fill="#ffffff"/>
  <rect x="40" y="48" width="20" height="2" fill="#ffffff"/>
  <rect x="42" y="50" width="16" height="2" fill="#ffffff"/>

  <!-- Tassel -->
  <circle cx="70" cy="35" r="2" fill="#fbbf24"/>
  <line x1="70" y1="37" x2="70" y2="42" stroke="#fbbf24" stroke-width="1"/>
  <circle cx="70" cy="42" r="1.5" fill="#fbbf24"/>

  <!-- Book -->
  <rect x="35" y="60" width="30" height="20" rx="2" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="35" y1="68" x2="65" y2="68" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="35" y1="75" x2="65" y2="75" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="50" y1="60" x2="50" y2="80" stroke="#e2e8f0" stroke-width="1"/>
</svg>